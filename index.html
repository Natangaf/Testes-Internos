document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">DOSAGEM<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">{{ b_openItem.dose }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">EXCEÇÕES<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">{{ b_openItem.excecoes }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">MODALIDADE<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">{{ b_openItem.modalidade }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">CALDA TERRESTRE<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">{{ b_openItem.caldaTerrestre }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">CALDA AÉREA<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">{{ b_openItem.caldaAerea }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:11px; color:#95A39C; font-weight:600; margin-bottom:3px;\">FONTE<\u002Fdiv><div style=\"font-size:13px; color:#1F2A24;\">Bula p. {{ b_openItem.pagina }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <button onclick=\"{{ b_openItem.onAccept }}\" style=\"flex:1; padding:9px; border-radius:7px; border:1px solid #C7E8D3; background:#E9F5EC; color:#134E39; font-size:13px; font-weight:600; cursor:pointer;\">✓ Aceitar entrada<\u002Fbutton>\n                  <button onclick=\"{{ b_openItem.onReject }}\" style=\"flex:1; padding:9px; border-radius:7px; border:1px solid #F3D2CE; background:#FFF5F5; color:#C0392B; font-size:13px; font-weight:600; cursor:pointer;\">✕ Rejeitar<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ b_isExclusoes }}\">\n                <div style=\"font-size:13px; color:#5B6B63; margin-bottom:8px;\">{{ b_openItem.justificativa }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:#95A39C; margin-bottom:18px;\">Fonte: Bula p. {{ b_openItem.pagina }}<\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <button onclick=\"{{ b_openItem.onAccept }}\" style=\"flex:1; padding:9px; border-radius:7px; border:1px solid #E5E9E7; background:#fff; color:#5B6B63; font-size:13px; font-weight:600; cursor:pointer;\">Manter no banco<\u002Fbutton>\n                  <button onclick=\"{{ b_openItem.onReject }}\" style=\"flex:1; padding:9px; border-radius:7px; border:1px solid #F3D2CE; background:#FFF5F5; color:#C0392B; font-size:13px; font-weight:600; cursor:pointer;\">Remover<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ b_noOpenItem }}\">\n            <div style=\"display:flex; align-items:center; justify-content:center; height:100%; min-height:400px; text-align:center; color:#95A39C; font-size:13px; padding:0 20px;\">\n              Clique em uma linha à esquerda para ver o comparativo completo entre o valor atual e o sugerido pela IA.\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  ALTERACOES = [\n    { id: '115897', cultura: 'Algodão', praga: 'Amendoim-bravo', cientifico: 'Euphorbia heterophylla', excecao: 'Sistema de Plantio Direto', fields: [\n      { label: 'Modalidade de Aplicação', atual: 'Pulverização costal | Pulverização tratorizada', sugerido: 'Pulverização tratorizada | Pulverização aérea', tipo: 'obrigatoria' },\n      { label: 'Calda Terrestre', atual: '200 a 400 L de calda/ha', sugerido: '50 a 200 L de calda/ha', tipo: 'obrigatoria' },\n      { label: 'Calda Aérea', atual: 'Não informado', sugerido: '15 a 40 L de calda/ha', tipo: 'obrigatoria' },\n      { label: 'Taxa de Aplicação', atual: 'Não informado', sugerido: null, nota: 'A bula não define esse campo de forma inequívoca — revisão humana necessária antes do preenchimento.', tipo: 'revisao' },\n    ] },\n    { id: '115898b', cultura: 'Algodão', praga: 'Angiquinho', cientifico: 'Aeschynomene rudis', excecao: 'Sistema de Plantio Direto', fields: [\n      { label: 'Dosagem Máxima', atual: '3 L/ha', sugerido: '2 L/ha', tipo: 'obrigatoria' },\n      { label: 'Modalidade de Aplicação', atual: 'Pulverização costal | Pulverização tratorizada', sugerido: 'Pulverização tratorizada | Pulverização aérea', tipo: 'obrigatoria' },\n      { label: 'Intervalo de Segurança', atual: 'SPD: não determinado · Geneticamente modificado: 130 dias', sugerido: 'Não determinado', tipo: 'obrigatoria' },\n    ] },\n    { id: '116118', cultura: 'Soja', praga: 'Amendoim-bravo', cientifico: 'Euphorbia heterophylla', excecao: 'Sistema de Plantio Direto', fields: [\n      { label: 'Modalidade de Aplicação', atual: 'Pulverização costal | Pulverização tratorizada', sugerido: 'Pulverização tratorizada | Pulverização aérea', tipo: 'obrigatoria' },\n      { label: 'Calda Terrestre', atual: '200 a 400 L de calda/ha', sugerido: '50 a 200 L de calda/ha', tipo: 'obrigatoria' },\n      { label: 'Intervalo de Segurança', atual: 'SPD: não determinado · Geneticamente modificado: 56 dias', sugerido: 'Não determinado', tipo: 'obrigatoria' },\n    ] },\n    { id: '192609', cultura: 'Milho', praga: 'Carrapicho-de-carneiro', cientifico: 'Acanthospermum hispidum', excecao: '—', fields: [\n      { label: 'Modalidade de Aplicação', atual: 'Pulverização aérea | Pulverização tratorizada', sugerido: 'Pulverização tratorizada | Pulverização aérea', tipo: 'obrigatoria' },\n      { label: 'Exceções', atual: 'Não informado', sugerido: 'Sistema de Plantio Direto', tipo: 'obrigatoria' },\n      { label: 'Temperatura do Ar', atual: 'Inferior a 30 °C', sugerido: 'Inferior a 25 °C', tipo: 'obrigatoria' },\n      { label: 'Umidade do Ar', atual: 'Superior a 50%', sugerido: 'Superior a 70%', tipo: 'obrigatoria' },\n    ] },\n    { id: '115963', cultura: 'Cana-de-açúcar', praga: 'Amendoim-bravo', cientifico: 'Euphorbia heterophylla', excecao: '—', fields: [\n      { label: 'Calda Terrestre', atual: '200 a 400 L de calda/ha', sugerido: 'Bentley: 80 a 120 L/ha · Tratorizada: 200 a 400 L/ha · Costal: 100 a 200 L/ha', tipo: 'obrigatoria' },\n      { label: 'Intervalo de Segurança', atual: '30 dias', sugerido: 'Não determinado (pré-plantio)', tipo: 'obrigatoria' },\n    ] },\n  ];\n\n  NOVAS = [\n    { id: 'n1', cultura: 'Algodão', praga: 'Carrapicho-rasteiro', cientifico: 'Acanthospermum australe', dose: '1,5 L/ha', modalidade: 'Pulverização tratorizada | Pulverização aérea', excecoes: 'Sistema de Plantio Direto', caldaTerrestre: '50 a 200 L de calda/ha', caldaAerea: '15 a 40 L de calda/ha', pagina: '4' },\n    { id: 'n2', cultura: 'Algodão', praga: 'Carrapicho-de-carneiro', cientifico: 'Acanthospermum hispidum', dose: '1,5 L/ha', modalidade: 'Pulverização tratorizada | Pulverização aérea', excecoes: 'Sistema de Plantio Direto', caldaTerrestre: '50 a 200 L de calda/ha', caldaAerea: '15 a 40 L de calda/ha', pagina: '4' },\n    { id: 'n3', cultura: 'Algodão', praga: 'Mentrasto', cientifico: 'Ageratum conyzoides', dose: '2 L/ha', modalidade: 'Pulverização tratorizada | Pulverização aérea', excecoes: 'Sistema de Plantio Direto', caldaTerrestre: '50 a 200 L de calda/ha', caldaAerea: '15 a 40 L de calda/ha', pagina: '4' },\n    { id: 'n4', cultura: 'Soja', praga: 'Carrapicho-rasteiro', cientifico: 'Acanthospermum australe', dose: '1,5 L/ha', modalidade: 'Pulverização tratorizada | Pulverização aérea', excecoes: 'Sistema de Plantio Direto', caldaTerrestre: '50 a 200 L de calda/ha', caldaAerea: '15 a 40 L de calda/ha', pagina: '4' },\n    { id: 'n5', cultura: 'Milho', praga: 'Apaga-fogo', cientifico: 'Alternanthera tenella', dose: '1 L/ha', modalidade: 'Pulverização tratorizada | Pulverização aérea', excecoes: 'Sistema de Plantio Direto', caldaTerrestre: '50 a 200 L de calda/ha', caldaAerea: '15 a 40 L de calda/ha', pagina: '4' },\n    { id: 'n6', cultura: 'Cana-de-açúcar', praga: 'Carrapicho-rasteiro', cientifico: 'Acanthospermum australe', dose: '1,5 L/ha', modalidade: 'Pulverização costal | Pulverização tratorizada', excecoes: '—', caldaTerrestre: 'Bentley: 80 a 120 L/ha · Tratorizada: 200 a 400 L/ha · Costal: 100 a 200 L/ha', caldaAerea: 'Não aplicável', pagina: '4' },\n  ];\n\n  EXCLUSOES = [\n    { id: 'e1', cultura: 'Algodão', praga: 'Arroz vermelho', cientifico: 'Oryza sativa', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n    { id: 'e2', cultura: 'Algodão', praga: 'Capim-marmelada', cientifico: 'Brachiaria plantaginea', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n    { id: 'e3', cultura: 'Algodão', praga: 'Corda-de-viola', cientifico: 'Ipomoea grandifolia', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n    { id: 'e4', cultura: 'Soja', praga: 'Arroz vermelho', cientifico: 'Oryza sativa', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n    { id: 'e5', cultura: 'Milho', praga: 'Falso-cominho', cientifico: 'Fimbristylis miliacea', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n    { id: 'e6', cultura: 'Cana-de-açúcar', praga: 'Arroz vermelho', cientifico: 'Oryza sativa', justificativa: 'Relação não localizada na tabela atual de plantas infestantes da cultura geral.', pagina: '4-7' },\n  ];\n\n  state = {\n    a: { tab: 'alteracoes', cultura: 'Todas', classificacao: 'Todas', search: '', fieldDecisions: {}, itemDecisions: {}, openRow: null },\n    b: { tab: 'alteracoes', cultura: 'Todas', classificacao: 'Todas', search: '', fieldDecisions: {}, itemDecisions: {}, openRow: null },\n  };\n\n  setTab(opt, tab) { this.setState(s => ({ ...s, [opt]: { ...s[opt], tab, openRow: null } })); }\n  setCultura(opt, val) { this.setState(s => ({ ...s, [opt]: { ...s[opt], cultura: val } })); }\n  setClassificacao(opt, val) { this.setState(s => ({ ...s, [opt]: { ...s[opt], classificacao: val } })); }\n  setSearch(opt, val) { this.setState(s => ({ ...s, [opt]: { ...s[opt], search: val } })); }\n  setOpenRow(opt, id) { this.setState(s => ({ ...s, [opt]: { ...s[opt], openRow: s[opt].openRow === id ? null : id } })); }\n\n  setFieldDecision(opt, itemId, idx, decision) {\n    this.setState(s => {\n      const key = itemId + ':' + idx;\n      const cur = { ...s[opt].fieldDecisions };\n      cur[key] = cur[key] === decision ? undefined : decision;\n      return { ...s, [opt]: { ...s[opt], fieldDecisions: cur } };\n    });\n  }\n  setAllFieldDecisions(opt, item, decision) {\n    this.setState(s => {\n      const cur = { ...s[opt].fieldDecisions };\n      item.fields.forEach((f, idx) => { cur[item.id + ':' + idx] = decision; });\n      return { ...s, [opt]: { ...s[opt], fieldDecisions: cur } };\n    });\n  }\n  setItemDecision(opt, itemId, decision) {\n    this.setState(s => {\n      const cur = { ...s[opt].itemDecisions };\n      cur[itemId] = cur[itemId] === decision ? undefined : decision;\n      return { ...s, [opt]: { ...s[opt], itemDecisions: cur } };\n    });\n  }\n\n  matchesSearch(it, search) {\n    if (!search) return true;\n    const q = search.toLowerCase();\n    return it.praga.toLowerCase().includes(q) || it.cientifico.toLowerCase().includes(q);\n  }\n\n  buildOption(opt) {\n    const st = this.state[opt];\n\n    const alteracoes = this.ALTERACOES\n      .filter(it => (st.cultura === 'Todas' || it.cultura === st.cultura))\n      .filter(it => (st.classificacao === 'Todas' || it.fields.some(f => f.tipo === st.classificacao)))\n      .filter(it => this.matchesSearch(it, st.search))\n      .map(it => {\n        const fields = it.fields.map((f, idx) => {\n          const key = it.id + ':' + idx;\n          const decision = st.fieldDecisions[key];\n          return {\n            ...f,\n            idx,\n            isObrigatoria: f.tipo === 'obrigatoria',\n            isRevisao: f.tipo === 'revisao',\n            isAccepted: decision === 'accepted',\n            isRejected: decision === 'rejected',\n            onAccept: () => this.setFieldDecision(opt, it.id, idx, 'accepted'),\n            onReject: () => this.setFieldDecision(opt, it.id, idx, 'rejected'),\n          };\n        });\n        const acceptedCount = fields.filter(f => f.isAccepted).length;\n        const rejectedCount = fields.filter(f => f.isRejected).length;\n        return {\n          ...it,\n          fields,\n          fieldsCount: fields.length,\n          obrigatoriaCount: fields.filter(f => f.isObrigatoria).length,\n          acceptedCount,\n          rejectedCount,\n          pendingCount: fields.length - acceptedCount - rejectedCount,\n          acceptAll: () => this.setAllFieldDecisions(opt, it, 'accepted'),\n          rejectAll: () => this.setAllFieldDecisions(opt, it, 'rejected'),\n          openDrawer: () => this.setOpenRow(opt, it.id),\n        };\n      });\n\n    const novas = this.NOVAS\n      .filter(it => (st.cultura === 'Todas' || it.cultura === st.cultura))\n      .filter(it => this.matchesSearch(it, st.search))\n      .map(it => {\n        const decision = st.itemDecisions[it.id];\n        return {\n          ...it,\n          isPending: !decision,\n          isAccepted: decision === 'accepted',\n          isRejected: decision === 'rejected',\n          onAccept: () => this.setItemDecision(opt, it.id, 'accepted'),\n          onReject: () => this.setItemDecision(opt, it.id, 'rejected'),\n          openDrawer: () => this.setOpenRow(opt, it.id),\n        };\n      });\n\n    const exclusoes = this.EXCLUSOES\n      .filter(it => (st.cultura === 'Todas' || it.cultura === st.cultura))\n      .filter(it => this.matchesSearch(it, st.search))\n      .map(it => {\n        const decision = st.itemDecisions[it.id];\n        return {\n          ...it,\n          isPending: !decision,\n          isAccepted: decision === 'accepted',\n          isRejected: decision === 'rejected',\n          onAccept: () => this.setItemDecision(opt, it.id, 'accepted'),\n          onReject: () => this.setItemDecision(opt, it.id, 'rejected'),\n          openDrawer: () => this.setOpenRow(opt, it.id),\n        };\n      });\n\n    const isAlteracoes = st.tab === 'alteracoes';\n    const isNovas = st.tab === 'novas';\n    const isExclusoes = st.tab === 'exclusoes';\n\n    let openItem = null;\n    if (st.openRow) {\n      const pool = isAlteracoes ? alteracoes : isNovas ? novas : exclusoes;\n      openItem = pool.find(x => x.id === st.openRow) || null;\n    }\n\n    return {\n      cultura: st.cultura,\n      classificacao: st.classificacao,\n      search: st.search,\n      isAlteracoes, isNovas, isExclusoes,\n      altActive: isAlteracoes, altInactive: !isAlteracoes,\n      novasActive: isNovas, novasInactive: !isNovas,\n      exclActive: isExclusoes, exclInactive: !isExclusoes,\n      setTabAlteracoes: () => this.setTab(opt, 'alteracoes'),\n      setTabNovas: () => this.setTab(opt, 'novas'),\n      setTabExclusoes: () => this.setTab(opt, 'exclusoes'),\n      onCulturaChange: (e) => this.setCultura(opt, e.target.value),\n      onClassificacaoChange: (e) => this.setClassificacao(opt, e.target.value),\n      onSearchChange: (e) => this.setSearch(opt, e.target.value),\n      alteracoesItems: alteracoes,\n      novasItems: novas,\n      exclusoesItems: exclusoes,\n      countAlteracoesShown: alteracoes.length,\n      countNovasShown: novas.length,\n      countExclusoesShown: exclusoes.length,\n      openItem,\n      hasOpenItem: !!openItem,\n      noOpenItem: !openItem,\n    };\n  }\n\n  renderVals() {\n    const a = this.buildOption('a');\n    const b = this.buildOption('b');\n    const out = {};\n    Object.keys(a).forEach(k => { out['a_' + k] = a[k]; });\n    Object.keys(b).forEach(k => { out['b_' + k] = b[k]; });\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
